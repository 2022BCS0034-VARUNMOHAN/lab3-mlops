name: CI-CD Inference Pipeline

on:
  push:
    branches:
      - main

jobs:
  train:
    name: Train Model (CI)
    runs-on: ubuntu-latest

    outputs:
      mse: ${{ steps.read_metrics.outputs.mse }}
      r2: ${{ steps.read_metrics.outputs.r2 }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install scikit-learn joblib numpy

      - name: Run training script
        run: |
          python scripts/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          MSE=$(jq -r '.MSE' Metrics/metrics.json)
          R2=$(jq -r '.R2' Metrics/metrics.json)
          echo "mse=$MSE" >> $GITHUB_OUTPUT
          echo "r2=$R2" >> $GITHUB_OUTPUT
          echo "Current MSE: $MSE"
          echo "Current R2: $R2"

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: Model/model.pkl

      - name: Upload metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: Metrics/metrics.json

  deploy:
    name: Deploy Model (CD)
    needs: train
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq bc

      - name: Download model
        uses: actions/download-artifact@v4
        with:
          name: model
          path: Model

      - name: Download metrics
        uses: actions/download-artifact@v4
        with:
          name: metrics
          path: Metrics

      - name: Compare metrics
        id: compare
        run: |
          CURRENT_MSE=$(jq -r '.MSE' Metrics/metrics.json)
          CURRENT_R2=$(jq -r '.R2' Metrics/metrics.json)

          BEST_MSE=${{ vars.BEST_MSE }}
          BEST_R2=${{ vars.BEST_R2 }}

          echo "Best MSE so far: $BEST_MSE"
          echo "Current MSE: $CURRENT_MSE"
          echo "Best R2 so far: $BEST_R2"
          echo "Current R2: $CURRENT_R2"

          BETTER_MSE=$(echo "$CURRENT_MSE < $BEST_MSE" | bc)
          BETTER_R2=$(echo "$CURRENT_R2 > $BEST_R2" | bc)

          if [ "$BETTER_MSE" -eq 1 ] && [ "$BETTER_R2" -eq 1 ]; then
            echo "DEPLOY=true" >> $GITHUB_ENV
            echo "Model improved. Proceeding to deployment."
          else
            echo "DEPLOY=false" >> $GITHUB_ENV
            echo "2022BCS0034 ---- Metric did not improve"
          fi

      - name: Stop if model did not improve
        if: env.DEPLOY == 'false'
        run: exit 0

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build -t varuna10/varunmohanbcs34-wine-quality:latest .
          docker push varuna10/varunmohanbcs34-wine-quality:latest

      - name: Update BEST metrics
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createOrUpdateRepoVariable({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: "BEST_MSE",
              value: "${{ needs.train.outputs.mse }}"
            });

            await github.rest.actions.createOrUpdateRepoVariable({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: "BEST_R2",
              value: "${{ needs.train.outputs.r2 }}"
            });
